<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENZO | HR Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="app-shell" aria-label="ENZO HR assistant">
    <section class="chat-panel">
        <header class="chat-header">
            <div class="brand-lockup">
                <div class="brand-mark" aria-hidden="true">E</div>
                <div>
                    <h1>ENZO</h1>
                    <p>HR assistant</p>
                </div>
            </div>
            <div class="status-pill" id="statusPill">
                <span class="status-dot" id="statusDot" aria-hidden="true"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>

        <div class="chat-box" id="chatBox" aria-live="polite" aria-label="Conversation">
            <div class="bot-message" id="greeting">
                <span class="message-kicker">ENZO</span>
                Hi 👋 I'm ENZO. Ask me about leave or employees.
            </div>
        </div>

        <form class="input-container" id="chatForm">
            <label class="sr-only" for="messageInput">Message ENZO</label>
            <input
                type="text"
                id="messageInput"
                placeholder="Ask ENZO about leave or employees..."
                autocomplete="off"
            >

           <button id="voiceBtn" type="button" onclick="startVoice()" title="Voice input" aria-label="Voice input">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
</button>

            <button id="sendBtn" type="button" onclick="handleSendBtn()" title="Send" aria-label="Send message">
                <span aria-hidden="true">Send</span>
            </button>

            <div class="input-blocker" id="inputBlocker" aria-live="assertive">
                <span class="blocker-text">Complete or cancel the current action</span>
                <button class="cancel-flow-btn" type="button" onclick="cancelFlow()">Cancel</button>
            </div>
        </form>
    </section>
</main>

<script src="/static/script.js"></script>
</body>
</html>
